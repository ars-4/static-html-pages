<script type="text/plain" id="T_embeddings">import httpx
import os
from dotenv import load_dotenv

load_dotenv()

OLLAMA_URL = os.getenv("OLLAMA_URL", "http://localhost:11434")
EMBED_MODEL = "%%EMBED%%"


async def get_embedding(text: str) -> list[float]:
    async with httpx.AsyncClient(timeout=60) as client:
        r = await client.post(
            f"{OLLAMA_URL}/api/embeddings",
            json={"model": EMBED_MODEL, "prompt": text, "keep_alive": 0}
        )
        r.raise_for_status()
        return r.json()["embedding"]


def get_embedding_sync(text: str) -> list[float]:
    with httpx.Client(timeout=60) as client:
        r = client.post(
            f"{OLLAMA_URL}/api/embeddings",
            json={"model": EMBED_MODEL, "prompt": text, "keep_alive": 0}
        )
        r.raise_for_status()
        return r.json()["embedding"]


def chunk_code(content: str, chunk_size: int = 60, overlap: int = 10) -> list[str]:
    lines = content.split("\n")
    chunks = []
    for i in range(0, len(lines), chunk_size - overlap):
        chunk = "\n".join(lines[i:i + chunk_size])
        if chunk.strip():
            chunks.append(chunk)
    return chunks
</script>

<script type="text/plain" id="T_style_memory">import os
import psycopg2
from pgvector.psycopg2 import register_vector
from dotenv import load_dotenv

load_dotenv()


class StyleMemory:
    def __init__(self):
        self.conn = psycopg2.connect(
            host=os.getenv("DB_HOST", "localhost"),
            port=os.getenv("DB_PORT", 5432),
            dbname=os.getenv("DB_NAME", "%%DB%%"),
            user=os.getenv("DB_USER", "%%USER%%"),
            password=os.getenv("DB_PASSWORD", ""),
        )
        register_vector(self.conn)
        self._init_tables()

    def _init_tables(self):
        with self.conn.cursor() as cur:
            cur.execute("CREATE EXTENSION IF NOT EXISTS vector;")
            cur.execute("""
                CREATE TABLE IF NOT EXISTS code_chunks (
                    id SERIAL PRIMARY KEY,
                    repo_name TEXT NOT NULL,
                    file_path TEXT NOT NULL,
                    language TEXT NOT NULL,
                    chunk TEXT NOT NULL,
                    embedding vector(384),
                    created_at TIMESTAMP DEFAULT NOW()
                );
            """)
            cur.execute("""
                CREATE TABLE IF NOT EXISTS style_rules (
                    id SERIAL PRIMARY KEY,
                    repo_name TEXT NOT NULL,
                    language TEXT NOT NULL,
                    category TEXT NOT NULL,
                    rule TEXT NOT NULL,
                    example TEXT,
                    created_at TIMESTAMP DEFAULT NOW()
                );
            """)
            cur.execute("""
                CREATE TABLE IF NOT EXISTS scanned_repos (
                    id SERIAL PRIMARY KEY,
                    repo_path TEXT UNIQUE NOT NULL,
                    repo_name TEXT NOT NULL,
                    languages TEXT[],
                    file_count INT DEFAULT 0,
                    scanned_at TIMESTAMP DEFAULT NOW()
                );
            """)
            cur.execute("""
                CREATE INDEX IF NOT EXISTS chunks_emb_idx ON code_chunks
                USING ivfflat (embedding vector_cosine_ops) WITH (lists = 10);
            """)
            self.conn.commit()

    def save_chunk(self, repo_name, file_path, language, chunk, embedding):
        with self.conn.cursor() as cur:
            cur.execute(
                "INSERT INTO code_chunks (repo_name,file_path,language,chunk,embedding) VALUES (%s,%s,%s,%s,%s)",
                (repo_name, file_path, language, chunk, embedding)
            )
        self.conn.commit()

    def save_style_rule(self, repo_name, language, category, rule, example=""):
        with self.conn.cursor() as cur:
            cur.execute(
                "INSERT INTO style_rules (repo_name,language,category,rule,example) VALUES (%s,%s,%s,%s,%s)",
                (repo_name, language, category, rule, example)
            )
        self.conn.commit()

    def register_repo(self, repo_path, repo_name, languages, file_count):
        with self.conn.cursor() as cur:
            cur.execute("""
                INSERT INTO scanned_repos (repo_path,repo_name,languages,file_count)
                VALUES (%s,%s,%s,%s)
                ON CONFLICT (repo_path) DO UPDATE SET
                scanned_at=NOW(), file_count=EXCLUDED.file_count, languages=EXCLUDED.languages
            """, (repo_path, repo_name, languages, file_count))
        self.conn.commit()

    def search_similar(self, embedding, language=None, limit=5):
        with self.conn.cursor() as cur:
            if language:
                cur.execute("""
                    SELECT repo_name,file_path,language,chunk,1-(embedding<=>%s::vector) AS sim
                    FROM code_chunks WHERE language=%s ORDER BY embedding<=>%s::vector LIMIT %s
                """, (embedding, language, embedding, limit))
            else:
                cur.execute("""
                    SELECT repo_name,file_path,language,chunk,1-(embedding<=>%s::vector) AS sim
                    FROM code_chunks ORDER BY embedding<=>%s::vector LIMIT %s
                """, (embedding, embedding, limit))
            return cur.fetchall()

    def get_style_rules(self, language=None):
        with self.conn.cursor() as cur:
            if language:
                cur.execute("SELECT category,rule,example FROM style_rules WHERE language=%s ORDER BY category", (language,))
            else:
                cur.execute("SELECT category,rule,example FROM style_rules ORDER BY language,category")
            return cur.fetchall()

    def get_scanned_repos(self):
        with self.conn.cursor() as cur:
            cur.execute("SELECT repo_path,repo_name,languages,file_count,scanned_at FROM scanned_repos ORDER BY scanned_at DESC")
            return cur.fetchall()

    def clear_repo(self, repo_name):
        with self.conn.cursor() as cur:
            cur.execute("DELETE FROM code_chunks WHERE repo_name=%s", (repo_name,))
            cur.execute("DELETE FROM style_rules WHERE repo_name=%s", (repo_name,))
        self.conn.commit()

    def get_stats(self):
        with self.conn.cursor() as cur:
            cur.execute("SELECT COUNT(*) FROM code_chunks"); chunks = cur.fetchone()[0]
            cur.execute("SELECT COUNT(*) FROM style_rules"); rules = cur.fetchone()[0]
            cur.execute("SELECT COUNT(*) FROM scanned_repos"); repos = cur.fetchone()[0]
        return {"chunks": chunks, "rules": rules, "repos": repos}
</script>

<script type="text/plain" id="T_file_manager">import os


class FileManager:
    def __init__(self, workspace: str = "%%WS%%"):
        self.workspace = workspace
        os.makedirs(workspace, exist_ok=True)

    def list_files(self) -> list[str]:
        files = []
        for root, _, filenames in os.walk(self.workspace):
            for f in filenames:
                full = os.path.join(root, f)
                files.append(os.path.relpath(full, self.workspace))
        return files

    def read_file(self, path: str) -> str:
        full = os.path.join(self.workspace, path)
        if not os.path.exists(full):
            return f"Error: {path} not found"
        with open(full, "r") as f:
            return f.read()

    def write_file(self, path: str, content: str) -> str:
        full = os.path.join(self.workspace, path)
        os.makedirs(os.path.dirname(full), exist_ok=True)
        with open(full, "w") as f:
            f.write(content)
        return f"Written: {path}"

    def delete_file(self, path: str) -> str:
        full = os.path.join(self.workspace, path)
        if not os.path.exists(full):
            return f"Error: {path} not found"
        os.remove(full)
        return f"Deleted: {path}"

    def get_context(self, paths: list[str]) -> str:
        ctx = ""
        for p in paths:
            ctx += f"\n\n--- FILE: {p} ---\n{self.read_file(p)}"
        return ctx
</script>

<script type="text/plain" id="T_code_runner">import subprocess, os, tempfile


class CodeRunner:
    def __init__(self, workspace: str = "%%WS%%"):
        self.workspace = workspace

    def run_file(self, path: str, timeout: int = 30) -> dict:
        full = os.path.join(self.workspace, path)
        if not os.path.exists(full):
            return {"success": False, "output": f"Not found: {path}"}
        cmds = {".py": ["python", full], ".js": ["node", full],
                ".dart": ["dart", full], ".sh": ["bash", full]}
        cmd = cmds.get(os.path.splitext(path)[1])
        if not cmd:
            return {"success": False, "output": "Unsupported file type"}
        try:
            r = subprocess.run(cmd, capture_output=True, text=True,
                               timeout=timeout, cwd=self.workspace)
            return {"success": r.returncode == 0,
                    "output": r.stdout or r.stderr or "No output",
                    "exit_code": r.returncode}
        except subprocess.TimeoutExpired:
            return {"success": False, "output": "Timed out (30s)"}
        except Exception as e:
            return {"success": False, "output": str(e)}

    def run_snippet(self, code: str, language: str = "python") -> dict:
        ext = {"python": ".py", "javascript": ".js", "dart": ".dart"}.get(language, ".py")
        with tempfile.NamedTemporaryFile(suffix=ext, mode="w", delete=False) as tmp:
            tmp.write(code); path = tmp.name
        try:
            cmd = {"py": ["python", path], ".js": ["node", path]}.get(ext, ["python", path])
            r = subprocess.run(cmd, capture_output=True, text=True, timeout=30)
            return {"success": r.returncode == 0, "output": r.stdout or r.stderr or "No output"}
        except subprocess.TimeoutExpired:
            return {"success": False, "output": "Timed out"}
        except Exception as e:
            return {"success": False, "output": str(e)}
        finally:
            os.unlink(path)
</script>

<script type="text/plain" id="T_scanner">import os, re
from pathlib import Path
from embeddings import get_embedding_sync, chunk_code
from style_memory import StyleMemory

LANGUAGE_MAP = {
    ".py": "python", ".dart": "dart", ".js": "javascript", ".vue": "vue",
    ".ts": "typescript", ".cpp": "cpp", ".cc": "cpp", ".c": "c",
    ".h": "c", ".hpp": "cpp",
}
SKIP_DIRS = {".git","node_modules","__pycache__",".dart_tool","build","dist",
             ".gradle",".idea","venv",".env","ios","android","web",".vscode"}
MAX_SIZE = 500 * 1024


class RepoScanner:
    def __init__(self):
        self.memory = StyleMemory()

    def scan(self, repo_path: str, progress_callback=None) -> dict:
        repo_path = os.path.abspath(repo_path)
        if not os.path.exists(repo_path):
            return {"success": False, "error": f"Not found: {repo_path}"}
        repo_name = os.path.basename(repo_path)
        files = self._collect(repo_path)
        if not files:
            return {"success": False, "error": "No supported files found"}
        langs = set()
        done = 0
        for fp, lang in files:
            try:
                with open(fp, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()
                if not content:
                    continue
                langs.add(lang)
                rel = os.path.relpath(fp, repo_path)
                for chunk in chunk_code(content):
                    self.memory.save_chunk(repo_name, rel, lang, chunk, get_embedding_sync(chunk))
                for rule in self._rules(content, lang, rel):
                    self.memory.save_style_rule(repo_name, lang,
                        rule["category"], rule["rule"], rule.get("example", ""))
                done += 1
                if progress_callback:
                    progress_callback(done, len(files), rel)
            except Exception as e:
                print(f"Error {fp}: {e}")
        self.memory.register_repo(repo_path, repo_name, list(langs), done)
        return {"success": True, "repo_name": repo_name,
                "files_scanned": done, "languages": list(langs)}

    def _collect(self, root):
        files = []
        for r, dirs, names in os.walk(root):
            dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
            for n in names:
                ext = Path(n).suffix.lower()
                if ext in LANGUAGE_MAP:
                    fp = os.path.join(r, n)
                    if os.path.getsize(fp) <= MAX_SIZE:
                        files.append((fp, LANGUAGE_MAP[ext]))
        return files

    def _rules(self, content, lang, path):
        rules = []
        if lang == "python":
            funcs = re.findall(r'def ([a-z_][a-z0-9_]*)\(', content)
            if funcs:
                rules.append({"category": "naming_conventions",
                               "rule": "Uses snake_case", "example": f"def {funcs[0]}():"})
            if re.search(r'def \w+\(.*:.*\)\s*->', content):
                rules.append({"category": "code_patterns", "rule": "Uses type hints"})
            for lib in re.findall(r'^(?:import|from)\s+(\w+)', content, re.MULTILINE):
                if lib in {"fastapi","django","flask","httpx","pydantic"}:
                    rules.append({"category": "libraries", "rule": f"Uses {lib}"})
        elif lang == "dart":
            if "StatefulWidget" in content:
                rules.append({"category": "code_patterns", "rule": "Uses StatefulWidget"})
            for lib in ["riverpod","provider","bloc","getx"]:
                if lib in content.lower():
                    rules.append({"category": "libraries", "rule": f"Uses {lib}"})
        elif lang in ("javascript","vue","typescript"):
            if re.search(r'const \w+ = \(.*\) =>', content):
                rules.append({"category": "code_patterns", "rule": "Prefers arrow functions"})
            if "defineProps" in content or "setup()" in content:
                rules.append({"category": "code_patterns", "rule": "Uses Vue 3 Composition API"})
        elif lang in ("c","cpp"):
            if "#pragma once" in content:
                rules.append({"category": "code_patterns", "rule": "Uses #pragma once"})
        parts = Path(path).parts
        if len(parts) > 1:
            rules.append({"category": "file_structure",
                           "rule": f"Uses {parts[0]}/ folder", "example": path})
        return rules
</script>

<script type="text/plain" id="T_agent">import httpx, json
from embeddings import get_embedding
from style_memory import StyleMemory

OLLAMA_URL = "http://localhost:11434/api/chat"


class CodingAgent:
    def __init__(self, model: str = "%%CHAT%%"):
        self.model = model
        self.history = []
        self.memory = StyleMemory()

    def reset(self):
        self.history = []

    async def _style_ctx(self, msg: str, lang=None) -> str:
        try:
            emb = await get_embedding(msg)
            similar = self.memory.search_similar(emb, language=lang, limit=4)
            rules = self.memory.get_style_rules(language=lang)
            ctx = ""
            if rules:
                ctx += "\n\n## YOUR CODING STYLE:\n"
                cat = None
                for c, r, ex in rules[:20]:
                    if c != cat:
                        ctx += f"\n### {c.replace('_',' ').title()}:\n"; cat = c
                    ctx += f"- {r}" + (f" (e.g. `{ex}`)" if ex else "") + "\n"
            if similar:
                ctx += "\n\n## SIMILAR CODE FROM YOUR REPOS:\n"
                for repo, path, l, chunk, sim in similar:
                    if sim > 0.3:
                        ctx += f"\n--- {repo}/{path} ---\n{chunk[:500]}\n"
            return ctx
        except Exception as e:
            print(f"Style ctx error: {e}"); return ""

    def _lang(self, msg: str):
        m = msg.lower()
        if any(w in m for w in ["python",".py","django","fastapi"]): return "python"
        if any(w in m for w in ["flutter","dart","widget"]): return "dart"
        if any(w in m for w in ["vue","javascript","js"]): return "javascript"
        if any(w in m for w in ["c++","cpp","arduino"]): return "cpp"
        return None

    async def chat(self, user_msg: str, file_ctx: str = "") -> dict:
        lang = self._lang(user_msg)
        style = await self._style_ctx(user_msg, lang)
        system = ('You are an expert coding assistant. Follow the user coding style.\n'
                  'Respond ONLY in JSON: {"message":"...","action":"write_file"|"none",'
                  '"file_path":"...","file_content":"..."}')
        if style: system += style
        if file_ctx: system += f"\n\nPROJECT FILES:\n{file_ctx}"
        self.history.append({"role": "user", "content": user_msg})
        payload = {
            "model": self.model,
            "messages": [{"role": "system", "content": system}, *self.history],
            "stream": False, "keep_alive": 0,
            "options": {"temperature": 0.2, "num_ctx": 4096}
        }
        try:
            async with httpx.AsyncClient(timeout=120) as client:
                r = await client.post(OLLAMA_URL, json=payload)
                r.raise_for_status()
                raw = r.json()["message"]["content"]
            self.history.append({"role": "assistant", "content": raw})
            try:
                clean = raw.strip()
                if clean.startswith("```"):
                    clean = clean.split("```")[1]
                    if clean.startswith("json"): clean = clean[4:]
                return {"success": True, "data": json.loads(clean.strip())}
            except json.JSONDecodeError:
                return {"success": True, "data": {"message": raw, "action": "none",
                                                   "file_path": "", "file_content": ""}}
        except httpx.TimeoutException:
            return {"success": False, "error": "Timed out"}
        except Exception as e:
            return {"success": False, "error": str(e)}
</script>

<script type="text/plain" id="T_main_py">from fastapi import FastAPI, HTTPException, BackgroundTasks
from fastapi.middleware.cors import CORSMiddleware
from pydantic import BaseModel
from agent import CodingAgent
from file_manager import FileManager
from code_runner import CodeRunner
from scanner import RepoScanner
from style_memory import StyleMemory

app = FastAPI(title="Coding Agent")
app.add_middleware(CORSMiddleware, allow_origins=["*"],
                   allow_methods=["*"], allow_headers=["*"])

agent = CodingAgent()
fm = FileManager()
cr = CodeRunner()
sc = RepoScanner()
mem = StyleMemory()
scan_st = {"running": False, "progress": 0, "total": 0, "current_file": "", "done": False}


class ChatReq(BaseModel):
    message: str
    context_files: list[str] = []

class WriteReq(BaseModel):
    path: str; content: str

class RunReq(BaseModel):
    path: str

class SnipReq(BaseModel):
    code: str; language: str = "python"

class ScanReq(BaseModel):
    path: str


@app.post("/chat")
async def chat(req: ChatReq):
    ctx = fm.get_context(req.context_files) if req.context_files else ""
    res = await agent.chat(req.message, ctx)
    if not res["success"]: raise HTTPException(500, res["error"])
    data = res["data"]
    if data.get("action") == "write_file" and data.get("file_path"):
        fm.write_file(data["file_path"], data["file_content"])
    return {"message": data.get("message",""), "action": data.get("action","none"),
            "file_path": data.get("file_path",""), "files": fm.list_files()}

@app.post("/reset")
def reset(): agent.reset(); return {"ok": True}

@app.get("/files")
def ls(): return {"files": fm.list_files()}

@app.get("/files/{path:path}")
def read(path: str): return {"content": fm.read_file(path)}

@app.post("/files")
def write(req: WriteReq):
    return {"message": fm.write_file(req.path, req.content), "files": fm.list_files()}

@app.delete("/files/{path:path}")
def delete(path: str):
    return {"message": fm.delete_file(path), "files": fm.list_files()}

@app.post("/run/file")
def run_file(req: RunReq): return cr.run_file(req.path)

@app.post("/run/snippet")
def run_snip(req: SnipReq): return cr.run_snippet(req.code, req.language)

@app.post("/scan")
async def scan(req: ScanReq, bg: BackgroundTasks):
    if scan_st["running"]: raise HTTPException(400, "Already scanning")
    def do():
        scan_st.update({"running":True,"progress":0,"total":0,"current_file":"","done":False})
        r = sc.scan(req.path, lambda p,t,c: scan_st.update({"progress":p,"total":t,"current_file":c}))
        scan_st.update({"running":False,"done":True,"result":r})
    bg.add_task(do); return {"message": "Scan started"}

@app.get("/scan/status")
def scan_status(): return scan_st

@app.get("/scan/repos")
def repos():
    return {"repos": [{"path":r[0],"name":r[1],"languages":r[2],
                        "file_count":r[3],"scanned_at":str(r[4])}
                       for r in mem.get_scanned_repos()]}

@app.get("/scan/stats")
def stats(): return mem.get_stats()

@app.delete("/scan/repos/{name}")
def del_repo(name: str): mem.clear_repo(name); return {"ok": True}

@app.get("/health")
def health(): return {"status": "ok", "model": agent.model}
</script>

<script setup>
import { ref, nextTick } from 'vue'
import MessageBubble from './MessageBubble.vue'
import * as api from '../services/api'

const props = defineProps({ contextFiles: Array })
const input = ref(''), messages = ref([]), loading = ref(false), msgsEl = ref(null)

async function send() {
  const t = input.value.trim()
  if (!t || loading.value) return
  messages.value.push({ role: 'user', content: t })
  input.value = ''; loading.value = true; await scroll()
  try {
    const r = await api.chatWithAgent(t, props.contextFiles)
    messages.value.push({ role: 'assistant', content: r.message, filePath: r.file_path || null })
  } catch (e) {
    messages.value.push({ role: 'assistant', content: `Error: ${e.message}` })
  } finally { loading.value = false; await scroll() }
}

async function resetChat() { await api.resetChat(); messages.value = [] }
async function scroll() {
  await nextTick()
  if (msgsEl.value) msgsEl.value.scrollTop = msgsEl.value.scrollHeight
}
SCRIPT_CLOSE

<script setup>
import { ref, computed, onMounted, onUnmounted } from 'vue'
import axios from 'axios'

const BASE = 'http://localhost:%%PORT%%'
const scanPath = ref(''), scanning = ref(false), done = ref(false)
const status = ref({ progress: 0, total: 0, current_file: '' })
const repos = ref([]), stats = ref(null)
let poll = null

onMounted(() => { load(); loadStats() })
onUnmounted(() => { if (poll) clearInterval(poll) })

async function load() { repos.value = (await axios.get(`${BASE}/scan/repos`)).data.repos }
async function loadStats() { stats.value = (await axios.get(`${BASE}/scan/stats`)).data }

async function startScan() {
  scanning.value = true; done.value = false
  await axios.post(`${BASE}/scan`, { path: scanPath.value })
  poll = setInterval(async () => {
    const r = (await axios.get(`${BASE}/scan/status`)).data
    status.value = r
    if (!r.running && r.done) {
      clearInterval(poll); scanning.value = false; done.value = true
      load(); loadStats()
    }
  }, 1000)
}

async function del(name) { await axios.delete(`${BASE}/scan/repos/${name}`); load(); loadStats() }

const pct = computed(() =>
  status.value.total ? Math.round(status.value.progress / status.value.total * 100) : 0
)

<script type="text/plain" id="T_readme"># Coding Agent on Ollama

A fully local AI coding agent with RAG-based style memory.

## Quick Start

```bash
# 1. Setup PostgreSQL
psql -U %%USER%% -c "CREATE DATABASE %%DB%%;"

# 2. Pull Ollama models
ollama pull %%CHAT%%
ollama pull %%EMBED%%

# 3. Start backend
cd backend
cp .env.example .env   # edit DB_PASSWORD
pip install -r requirements.txt
uvicorn main:app --reload --port %%PORT%%

# 4. Start frontend
cd frontend
npm install
npm run dev
```

## Features
- Chat with AI agent about your code
- AI writes and edits files automatically
- Run code and see output
- RAG style memory: scans repos, learns your coding style
- keep_alive=0: models unload from RAM/VRAM immediately after generation

## Models
- Chat: `%%CHAT%%`
- Embeddings: `%%EMBED%%`

## Hardware Notes
Optimized for: i5-3470, GTX 1060 3GB, 12GB RAM.
keep_alive=0 keeps VRAM free between requests.

      <div class="field">
        <label>Embed Model</label>
        <select id="embedModel" onchange="updatePreview()">
          <option value="nomic-embed-text">nomic-embed-text (recommended)</option>
          <option value="mxbai-embed-large">mxbai-embed-large</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Backend Port</label><input id="port" value="8000" oninput="updatePreview()"/></div>
      <div class="field"><label>DB Name</label><input id="dbName" value="coding_agent" oninput="updatePreview()"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>DB User</label><input id="dbUser" value="postgres" oninput="updatePreview()"/></div>
      <div class="field"><label>Workspace Folder</label><input id="ws" value="./workspace" oninput="updatePreview()"/></div>
    </div>
  </div>

  <div class="section">
    <div class="stitle"><em>3</em> File Preview</div>
    <div class="tree" id="treePreview"></div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="section">
    <div class="stitle"><em>4</em> Generate</div>
    <button class="btn" id="genBtn" onclick="generate()">⚡ Generate &amp; Download ZIP</button>
    <div class="pw" id="pw">
      <div class="pbg"><div class="pf" id="pf"></div></div>
      <div class="pl" id="pl">Generating...</div>
    </div>
    <div class="sc" id="sc">
      <div class="si">✅</div>
      <div class="st">ZIP Ready!</div>
      <div class="ss" id="ss"></div>
      <button class="dl" id="dlBtn">⬇ Download ZIP</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
function cfg() {
  return {
    CHAT: document.getElementById('chatModel').value,
    EMBED: document.getElementById('embedModel').value,
    PORT: document.getElementById('port').value || '8000',
    DB: document.getElementById('dbName').value || 'coding_agent',
    USER: document.getElementById('dbUser').value || 'postgres',
    WS: document.getElementById('ws').value || './workspace',
  };
}

// Read a text/plain template and substitute %%KEY%% placeholders
function tpl(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  const c = cfg();
  let text = el.textContent;
  // Fix the script close placeholder we used to avoid premature tag closing
  text = text.replace(/SCRIPT_CLOSE/g, '<\/script>');
  return text
    .replace(/%%CHAT%%/g, c.CHAT)
    .replace(/%%EMBED%%/g, c.EMBED)
    .replace(/%%PORT%%/g, c.PORT)
    .replace(/%%DB%%/g, c.DB)
    .replace(/%%USER%%/g, c.USER)
    .replace(/%%WS%%/g, c.WS);
}

function isOn(label) {
  for (const el of document.querySelectorAll('#components .ci')) {
    if (el.querySelector('.cl').textContent.trim() === label)
      return el.classList.contains('on');
  }
  return false;
}

function toggleCheck(el) {
  el.classList.toggle('on');
  updatePreview();
}

// ── File manifest ─────────────────────────────────────────────────────────────
function manifest() {
  const files = [];
  const add = (name, id, content) => files.push({ name, id, content });
  const dir = (name) => files.push({ name, dir: true });

  if (isOn('FastAPI Backend')) {
    dir('backend/');
    add('backend/main.py', 'T_main_py');
    add('backend/agent.py', 'T_agent');
    add('backend/requirements.txt', 'T_requirements');
    add('backend/.env.example', 'T_env');
    if (isOn('File Manager')) add('backend/file_manager.py', 'T_file_manager');
    if (isOn('Code Runner')) add('backend/code_runner.py', 'T_code_runner');
    if (isOn('Style Memory (RAG)')) {
      add('backend/style_memory.py', 'T_style_memory');
      add('backend/embeddings.py', 'T_embeddings');
    }
    if (isOn('Repo Scanner')) add('backend/scanner.py', 'T_scanner');
  }

  if (isOn('Vue.js Frontend')) {
    dir('frontend/');
    add('frontend/package.json', 'T_pkg_json');
    add('frontend/index.html', 'T_index_html');
    dir('frontend/src/');
    add('frontend/src/main.js', 'T_main_js');
    add('frontend/src/App.vue', 'T_App_vue');
    dir('frontend/src/services/');
    add('frontend/src/services/api.js', 'T_api_js');
    dir('frontend/src/components/');
    add('frontend/src/components/ChatPanel.vue', 'T_ChatPanel_vue');
    add('frontend/src/components/MessageBubble.vue', 'T_MessageBubble_vue');
    add('frontend/src/components/FileExplorer.vue', 'T_FileExplorer_vue');
    if (isOn('Style Memory (RAG)'))
      add('frontend/src/components/StyleMemory.vue', 'T_StyleMemory_vue');
  }

  if (isOn('Flutter Frontend')) {
    dir('flutter_app/');
    flutterFiles().forEach(f => files.push(f));
  }

  if (isOn('Django OAuth')) {
    dir('django_oauth/');
    djangoFiles().forEach(f => files.push(f));
  }

  add('README.md', 'T_readme');
  return files;
}

// ── Flutter files (inline, safe strings) ─────────────────────────────────────
function flutterFiles() {
  const p = cfg().PORT;
  return [
    { name: 'flutter_app/pubspec.yaml', content: 'name: coding_agent\ndescription: Flutter Coding Agent\nenvironment:\n  sdk: ">=3.0.0 <4.0.0"\ndependencies:\n  flutter:\n    sdk: flutter\n  http: ^1.2.1\n  flutter_secure_storage: ^9.0.0\nflutter:\n  uses-material-design: true' },
    { name: 'flutter_app/lib/main.dart', content: "import 'package:flutter/material.dart';\nimport 'screens/chat_screen.dart';\nvoid main() { runApp(const MyApp()); }\nclass MyApp extends StatelessWidget {\n  const MyApp({super.key});\n  @override Widget build(BuildContext context) {\n    return MaterialApp(title: 'Coding Agent', home: const ChatScreen());\n  }\n}" },
    { name: 'flutter_app/lib/models/message.dart', content: "class Message {\n  final String role, content;\n  final String? filePath;\n  Message({required this.role, required this.content, this.filePath});\n}" },
    { name: 'flutter_app/lib/services/api_service.dart', content: "import 'dart:convert';\nimport 'package:http/http.dart' as http;\nclass ApiService {\n  static const String baseUrl = 'http://10.0.2.2:" + p + "';\n  static Future<Map<String,dynamic>> chat({required String message}) async {\n    final res = await http.post(Uri.parse('$baseUrl/chat'),\n      headers: {'Content-Type':'application/json'},\n      body: '{\"message\":\"$message\"}');\n    if (res.statusCode == 200) return {}; // parse as needed\n    throw Exception('Chat failed');\n  }\n}" },
    { name: 'flutter_app/lib/screens/chat_screen.dart', content: "import 'package:flutter/material.dart';\nclass ChatScreen extends StatefulWidget {\n  const ChatScreen({super.key});\n  @override State createState() => _S();\n}\nclass _S extends State<ChatScreen> {\n  final _ctrl = TextEditingController();\n  @override Widget build(BuildContext ctx) {\n    return Scaffold(\n      appBar: AppBar(title: const Text('Coding Agent')),\n      body: Column(children: [\n        Expanded(child: Container()),\n        TextField(controller: _ctrl, decoration: const InputDecoration(hintText: 'Ask...')),\n      ]),\n    );\n  }\n}" },
  ];
}

// ── Django files (inline, safe strings) ──────────────────────────────────────
function djangoFiles() {
  return [
    { name: 'django_oauth/requirements.txt', content: 'django\ndjangorestframework\ndjango-allauth\ndj-rest-auth\ndjangorestframework-simplejwt\npython-dotenv' },
    { name: 'django_oauth/manage.py', content: "import os, sys\ndef main():\n    os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'myproject.settings')\n    from django.core.management import execute_from_command_line\n    execute_from_command_line(sys.argv)\nif __name__ == '__main__':\n    main()" },
    { name: 'django_oauth/myproject/__init__.py', content: '' },
    { name: 'django_oauth/myproject/urls.py', content: "from django.contrib import admin\nfrom django.urls import path, include\nurlpatterns = [path('admin/', admin.site.urls), path('accounts/', include('accounts.urls'))]" },
    { name: 'django_oauth/accounts/__init__.py', content: '' },
    { name: 'django_oauth/accounts/models.py', content: "from django.db import models\nclass UserProfile(models.Model):\n    email = models.EmailField(unique=True)\n    name = models.CharField(max_length=255)\n    created_at = models.DateTimeField(auto_now_add=True)" },
    { name: 'django_oauth/accounts/serializers.py', content: "from rest_framework import serializers\nfrom .models import UserProfile\nclass UserProfileSerializer(serializers.ModelSerializer):\n    class Meta:\n        model = UserProfile\n        fields = ['id', 'email', 'name', 'created_at']" },
    { name: 'django_oauth/accounts/views.py', content: "from rest_framework.views import APIView\nfrom rest_framework.response import Response\nfrom rest_framework.permissions import IsAuthenticated\nfrom .models import UserProfile\nfrom .serializers import UserProfileSerializer\nclass UserProfileView(APIView):\n    permission_classes = [IsAuthenticated]\n    def get(self, request):\n        try:\n            p = UserProfile.objects.get(email=request.user.email)\n            return Response(UserProfileSerializer(p).data)\n        except UserProfile.DoesNotExist:\n            return Response({'error': 'Not found'}, status=404)" },
    { name: 'django_oauth/accounts/urls.py', content: "from django.urls import path\nfrom .views import UserProfileView\nurlpatterns = [path('profile/', UserProfileView.as_view())]" },
  ];
}

// ── Preview ───────────────────────────────────────────────────────────────────
function icon(name) {
  if (name.endsWith('.py')) return '🐍';
  if (name.endsWith('.vue')) return '💚';
  if (name.endsWith('.js')) return '🟨';
  if (name.endsWith('.dart')) return '🎯';
  if (name.endsWith('.md')) return '📝';
  if (name.endsWith('.yaml') || name.endsWith('.yml')) return '⚙️';
  if (name.endsWith('.json')) return '📋';
  if (name.includes('.env')) return '🔐';
  return '📄';
}

function updatePreview() {
  const files = manifest();
  const tree = document.getElementById('treePreview');
  tree.innerHTML = files.map(f => {
    const parts = f.name.split('/').filter(Boolean);
    const depth = parts.length - (f.dir ? 1 : 0);
    const label = parts.pop() + (f.dir ? '/' : '');
    const ic = f.dir ? '📁' : icon(f.name);
    return `<div class="ti ${f.dir ? 'd' : 'f'}" style="padding-left:${depth * 14}px">
      <span style="width:16px;text-align:center;flex-shrink:0">${ic}</span>${label}
    </div>`;
  }).join('');
  const fc = files.filter(f => !f.dir).length;
  document.getElementById('chips').innerHTML =
    `<div class="chip">Files: <b>${fc}</b></div><div class="chip">Total: <b>${files.length}</b></div>`;
}

// ── Generate ──────────────────────────────────────────────────────────────────
function setP(pct, label) {
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pl').textContent = label;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let zipBlob = null;

async function generate() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('sc').classList.remove('on');
  document.getElementById('pw').classList.add('on');
  setP(5, 'Initializing...'); await sleep(80);

  const zip = new JSZip();
  const files = manifest().filter(f => !f.dir);
  const total = files.length;
  let done = 0;

  for (const file of files) {
    const content = file.id ? tpl(file.id) : (file.content || '');
    zip.file(file.name, content);
    done++;
    setP(Math.round((done / total) * 88) + 5, `Adding ${file.name.split('/').pop()}...`);
    await sleep(20);
  }

  setP(97, 'Compressing...'); await sleep(80);
  zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
  setP(100, 'Done!'); await sleep(150);

  document.getElementById('pw').classList.remove('on');
  document.getElementById('sc').classList.add('on');
  document.getElementById('ss').textContent =
    `${total} files · ${(zipBlob.size / 1024).toFixed(1)} KB · Extract and follow the README`;

  document.getElementById('dlBtn').onclick = () => {
    const url = URL.createObjectURL(zipBlob);
    const a = Object.assign(document.createElement('a'),
      { href: url, download: 'coding-agent-on-ollama.zip' });
    a.click();
    URL.revokeObjectURL(url);
  };
  btn.disabled = false;
}

updatePreview();
</script>
</body>
</html>
